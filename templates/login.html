{% extends "base.html" %}

{% block title %}Acceso Administrador - Sistema de Becas{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Acceso Administrador</h1>

    <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Usuario:</label>
            <input type="text" id="username" name="username" required
                   class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña:</label>
            <input type="password" id="password" name="password" required
                   class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md">
            Ingresar
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="{{ url_for('becas.listado') }}" class="text-sm text-gray-600 hover:text-gray-800">← Volver al inicio</a>
    </div>
</div>
{% endblock %}
