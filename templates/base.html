<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Becas{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen relative">
    <a href="{{ url_for('auth.dashboard') if session.get('admin_id') else url_for('auth.login') }}"
       class="absolute top-4 right-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition">
        {% if session.get('admin_id') %}Admin{% else %}Ingresar{% endif %}
    </a>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="max-w-4xl mx-auto px-4 mt-4 space-y-2">
                {% for category, message in messages %}
                    <div class="p-3 rounded
                        {% if category == 'success' %}bg-green-100 text-green-800 border border-green-300
                        {% elif category == 'error' %}bg-red-100 text-red-800 border border-red-300
                        {% else %}bg-blue-100 text-blue-800 border border-blue-300{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
